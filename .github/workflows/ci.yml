name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install package and dev deps
        run: pip install -e ".[dev]"

      # Safety regression suite is the hardest gate — 16 cases, 100% recall required.
      # This runs without Ollama or Java so it always executes in CI.
      - name: Safety regression suite (16/16 must pass)
        run: make safety

      # Full unit test suite.  Tests that need Ollama or a trained model are marked
      # with @pytest.mark.skip so they don't block CI.
      - name: Unit tests
        run: pytest tests/ -v --ignore=tests/integration -m "not slow and not integration"

      - name: Lint (ruff)
        run: ruff check .
